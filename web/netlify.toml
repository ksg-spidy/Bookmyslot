# Locked build settings — overrides Netlify UI when base directory is `web`
[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  # Next.js server bundles reference env vars at build time — omit build cache/output from scan
  SECRETS_SCAN_OMIT_PATHS = ".netlify/**,.next/**"

[[plugins]]
  package = "@netlify/plugin-nextjs"
