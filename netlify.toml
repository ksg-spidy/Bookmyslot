# Repo root — app lives in web/ (see web/netlify.toml for Next.js plugin settings).
[build]
  base = "web"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  # Anon key is intentionally public; omit build artifacts from secret scan
  SECRETS_SCAN_OMIT_PATHS = ".netlify/**,.next/**"
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SITE_URL"
